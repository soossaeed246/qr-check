<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ماسح الدعوات</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family:Tahoma;
    background:#111;
    color:#fff;
    text-align:center;
    margin:0;
    padding:20px;
}
#reader{
    width:340px;
    margin:auto;
}
#result{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}
</style>

</head>

<body>

<h2>ماسح الدعوات</h2>

<div id="reader"></div>

<div id="result">
جاهز للمسح
</div>

<script>

const api="https://script.google.com/macros/s/AKfycbxwGjgxKtuOszqvnS-TpTUS-T0-IbfZf_GUCUhyN3HwDi3YwS3A3AzJk03AZcrnSQe3/exec";

let reading=false;

function success(decodedText){

if(reading)return;

reading=true;

let code="";

try{

const url=new URL(decodedText);

const params = new URLSearchParams(decodedText.split("?")[1]);
code = params.get("code");

}catch(e){

code=decodedText;

}

fetch(api+"?action=checkIn&code="+code)

.then(r=>r.json())

.then(data=>{

if(data.status=="checked"){

document.getElementById("result").innerHTML="✅ تم تسجيل الدخول";

}else{

document.getElementById("result").innerHTML="❌ الدعوة مستخدمة أو غير موجودة";

}

setTimeout(()=>{

document.getElementById("result").innerHTML="جاهز للمسح";

reading=false;

},1500);

});

}

const html5QrCode=new Html5Qrcode("reader");

html5QrCode.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
success
);

</script>

</body>
</html>
